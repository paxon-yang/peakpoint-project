  <!-- Chart bars (project management feel) -->
  <rect x="17" y="38" width="5" height="8" rx="1" fill="#38BDF8" opacity="0.8"/>
  <rect x="25" y="33" width="5" height="13" rx="1" fill="#38BDF8" opacity="0.8"/>
  <rect x="37" y="36" width="5" height="10" rx="1" fill="#38BDF8" opacity="0.8"/>
  <rect x="45" y="40" width="5" height="6" rx="1" fill="#38BDF8" opacity="0.6"/>
